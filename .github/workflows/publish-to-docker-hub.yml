name: Publish to Docker Hub

on:
  release:
    types: [published]
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'corretto'
          cache: gradle
      - name: Build Docker image
        run: ./gradlew bootBuildImage
      - name: Extract version
        id: version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Tag and push Docker image (release)
        if: github.event_name == 'release'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Pushing image with version tag: ${VERSION}"
          docker push 1csyntax/bsl-language-server:${VERSION}
          docker tag 1csyntax/bsl-language-server:${VERSION} 1csyntax/bsl-language-server:latest
          docker push 1csyntax/bsl-language-server:latest
      - name: Tag and push Docker image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Tagging image with develop tag from version: ${VERSION}"
          docker tag 1csyntax/bsl-language-server:${VERSION} 1csyntax/bsl-language-server:develop
          docker push 1csyntax/bsl-language-server:develop

