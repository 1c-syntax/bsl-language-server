# Конфигурация ArchUnit (см. ArchitectureTest).
#
# Часть правил обёрнута в FreezingArchRule: текущие нарушения зафиксированы как
# «базовая линия» в каталоге archunit_store/. Такие правила валят сборку только на
# НОВЫХ нарушениях, а уже существующие (которые нельзя убрать одномоментно —
# слоистые инверсии, легаси @Autowired) проходят. По мере чистки кода базовая
# линия автоматически сокращается (store обновляется при уменьшении числа нарушений).
freeze.store.default.path=archunit_store
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
