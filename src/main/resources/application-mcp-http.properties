# MCP over Streamable HTTP (profile `mcp-http`, activated by `websocket --mcp`).
# Served on the same servlet container as the LSP WebSocket endpoint.
# Endpoint path defaults to /mcp; override with `--mcp-path=<path>` (see BSLLSPLauncher).
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.protocol=STREAMABLE
