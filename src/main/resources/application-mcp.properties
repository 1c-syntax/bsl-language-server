# Common configuration for the MCP server (profile `mcp`), shared by all transports.
# Activated by the `mcp` subcommand (stdio), by `lsp --mcp` and by `websocket --mcp` (Streamable HTTP).
# Transport is selected by the sub-profile: mcp-stdio / lsp-mcp / websocket-mcp.
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.type=SYNC
# Имя и версия сервера берутся из AutoServerInfo (см. McpServerInfoCustomizer),
# чтобы не дублировать источник истины (spring.application.name + версия из манифеста).
spring.ai.mcp.server.annotation-scanner.enabled=true
