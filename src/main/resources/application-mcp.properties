# Common configuration for the MCP server (profile `mcp`), shared by both transports.
# Activated by the `mcp` subcommand (stdio) and by `websocket --mcp` (Streamable HTTP).
# Transport is selected by the sub-profile: application-mcp-stdio / application-mcp-http.
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.name=bsl-language-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.annotation-scanner.enabled=true
